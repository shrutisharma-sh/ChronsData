<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronosData AI</title>
    <style>
        :root {
            --bg-dark: #020617;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --accent: #6366f1;
            --accent-glow: #38bdf8;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        /* Subtle animated grid background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 30px; }
        }

        .container {
            width: 100%;
            max-width: 550px;
            animation: fadeIn 0.8s ease-out;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .box {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .box:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.4);
        }

        h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            padding: 12px 20px;
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #4f46e5;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Chat Styles */
        .chat {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .user, .bot {
            padding: 10px 14px;
            border-radius: 12px;
            margin: 8px 0;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: slideIn 0.3s ease-out;
        }

        .user {
            background: #334155;
            margin-left: auto;
            text-align: right;
            border-bottom-right-radius: 2px;
        }

        .bot {
            background: rgba(99, 102, 241, 0.2);
            border-left: 3px solid var(--accent-glow);
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
        }

        .response {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #000080;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        #validationResponse {
         margin-top: 15px;
         padding: 12px;
         border-radius: 10px;
         background: #f4f4f4;
         line-height: 1.6;
       }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ChronosData AI</h2>

    <div class="box">
        <h3>Ask your data</h3>
        <div class="input-group">
            <input type="text" id="query" placeholder="Ask something about your database..." />
            <button onclick="ask()">Ask</button>
        </div>
        <div class="chat" id="chatBox"></div>
    </div>

    <div class="box">
        <h3>Validate Metadata</h3>
        <div class="input-group" style="flex-direction: column;">
            <input type="text" id="table" placeholder="Table name" style="margin-bottom: 10px;" />
            <input type="text" id="owner" placeholder="Owner" style="margin-bottom: 10px;" />
            <button onclick="validate()" style="width: 100%;">Validate</button>
        </div>
        <p class="response" id="validationResponse"></p>
    </div>
</div>

<script>
    // Logic remains untouched as requested
    function ask() {
        const queryInput = document.getElementById("query");
        const query = queryInput.value;
        if(!query) return;

        document.getElementById("chatBox").innerHTML +=
            `<div class="user">You: ${query}</div>`;

        queryInput.value = ""; // Clear input for better UX

        fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: query
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("chatBox").innerHTML +=
                `<div class="bot">AI: ${data}</div>`;
            // Auto-scroll to bottom
            const chatBox = document.getElementById("chatBox");
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function validate() {
        const table = document.getElementById("table").value;
        const owner = document.getElementById("owner").value;

        fetch('/api/validate-metadata', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ table, owner })
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("validationResponse").innerHTML =
            data.replace(/\n/g, "<br>");
        });
    }
</script>

</body>
</html>
